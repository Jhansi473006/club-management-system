<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - ClubHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body, html { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        .split-layout { display: flex; height: 100vh; width: 100%; }
        
        /* Left Image Side */
        .split-image {
            flex: 1;
            background: url('images/auth_bg.png') center/cover no-repeat;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .split-image::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(107, 70, 193, 0.4), rgba(107, 70, 193, 0.8));
        }
        .image-content {
            position: relative;
            z-index: 10;
            color: white;
            text-align: center;
            padding: 2rem;
            max-width: 80%;
        }
        .image-content h2 { font-size: 2.5rem; margin-bottom: 1rem; font-family: 'Outfit', sans-serif; }
        .image-content p { font-size: 1.1rem; opacity: 0.9; }
        
        /* Right Form Side */
        .split-form {
            flex: 1;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .split-header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .split-header .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); font-family: 'Outfit', sans-serif; text-decoration: none;}
        .split-header a { color: var(--text-muted); text-decoration: none; font-weight: 500; font-size: 0.95rem; }
        
        .form-wrapper {
            margin: auto;
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
        .form-wrapper h2 {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .form-wrapper > p {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; margin-bottom: 0.5rem; color: var(--text-main); font-size: 0.9rem; font-weight: 500; }
        .form-control {
            width: 100%; padding: 0.75rem 1rem;
            background: white; border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-main); font-family: inherit; transition: all 0.3s;
            text-align: center; font-size: 1.5rem; letter-spacing: 0.5rem; font-weight: 600;
        }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .btn-full { width: 100%; padding: 0.85rem; font-size: 1rem; margin-top: 1rem; }
        
        @media (max-width: 768px) {
            .split-image { display: none; }
        }
    </style>
</head>
<body>
    <div class="split-layout">
        <!-- Left Side Image -->
        <div class="split-image">
            <div class="image-content">
                <h2>Secure Your Account</h2>
                <p>Verify your email to join your campus communities.</p>
            </div>
        </div>

        <!-- Right Side Form -->
        <div class="split-form">
            <div class="split-header">
                <a href="index.html" class="logo">ClubHub</a>
                <a href="login.html">← Back to Login</a>
            </div>
            
            <div class="form-wrapper">
                <h2>Verify Email</h2>
                <p>We've sent a 6-digit code to <strong id="display-email">your email</strong>. Please enter it below.</p>
                
                <form id="verify-form">
                    <div class="form-group">
                        <label class="form-label">Verification Code</label>
                        <input type="text" id="code" class="form-control" placeholder="000000" maxlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-full">Verify Account</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Get email from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if(email) {
            document.getElementById('display-email').textContent = email;
        }

        document.getElementById('verify-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('code').value;

            if(!email) {
                alert("Email not found in URL. Please go back to login.");
                return;
            }

            try {
                const res = await fetch('http://127.0.0.1:8000/auth/verify-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });

                if (res.ok) {
                    alert("Email verified successfully! You can now log in.");
                    window.location.href = 'login.html';
                } else {
                    const err = await res.json();
                    alert("Error: " + (err.detail || "Verification failed"));
                }
            } catch (err) {
                console.error(err);
                alert("Server error");
            }
        });
    </script>
</body>
</html>
