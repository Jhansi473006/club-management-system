<!DOCTYPE html>
<html>
<head>
    <title>Club Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar glass-nav px-4 d-flex justify-content-between align-items-center">
        <h3>Club Portal</h3>
        <div>
            <a href="/login" class="btn btn-light me-2">Login</a>
            <a href="/register" class="btn btn-outline-light">Register</a>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="section-title text-center">Available Clubs</h2>
        
        <div class="row justify-content-center mt-3 mb-4">
            <div class="col-md-8">
                <input type="text" id="searchInput" class="form-control form-control-lg glass-panel text-white p-3" placeholder="Search clubs by title or description..." onkeyup="filterClubs()">
            </div>
        </div>

        <div class="row mt-4" id="clubs"></div>
    </div>

    <script>
        async function loadClubs() {
            try {
                let res = await fetch("/clubs")
                let data = await res.json()

                let c = document.getElementById("clubs")
                c.innerHTML = ""

                if (data.length === 0) {
                    c.innerHTML = "<p class='text-center w-100'>No clubs available.</p>"
                    return;
                }

                data.forEach(club => {
                    c.innerHTML += `
                    <div class="col-md-4 mb-4">
                        <div class="card p-4 h-100">
                            <h4 class="fw-bold mb-3">${club.name}</h4>
                            <p class="text-white-50">${club.description}</p>
                        </div>
                    </div>`
                })
            } catch (err) {
                console.error(err);
            }
        }

        function filterClubs() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.querySelectorAll('#clubs .col-md-4');

            cards.forEach(card => {
                let text = card.innerText.toLowerCase();
                card.style.display = text.includes(input) ? "block" : "none";
            });
        }

        loadClubs()
    </script>
</body>
</html>
