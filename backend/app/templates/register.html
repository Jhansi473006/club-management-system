<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body style="text-align:center; padding-top:100px;">

    <h2>Register</h2>

    <select id="role">
        <option value="student">Student</option>
        <option value="leader">Leader</option>
    </select><br><br>

    <input id="name" placeholder="Name"><br><br>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <input id="club_name" placeholder="Club Name (leader only)"><br><br>

    <button onclick="registerUser()">Register</button>

    <p><a href="/login">Login</a></p>

    <script>
        async function registerUser() {
            let role = document.getElementById("role").value
            let name = document.getElementById("name").value
            let email = document.getElementById("email").value
            let password = document.getElementById("password").value
            let club_name = document.getElementById("club_name").value

            let url = role === "student" ? "/register/student" : "/register/leader"

            let body = role === "student"
                ? { name, email, password }
                : { name, email, password, club_name }

            let res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            })

            let data = await res.json()

            if (res.ok) {
                alert("Registered successfully")
                window.location.href = "/login"
            } else {
                alert(data.detail)
            }
        }
    </script>

</body>

</html>
