<!DOCTYPE html>
<html>
<head>
    <title>Leader Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar glass-nav d-flex justify-content-between px-4 align-items-center">
        <h4>Club Portal Workspace</h4>
        <div>
            <a href="/" class="btn btn-light me-2">Home</a>
            <button onclick="logout()" class="btn btn-outline-light">Logout</button>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <!-- EDIT CLUB DETAILS -->
            <div class="col-lg-4 mb-4">
                <h3 class="section-title">Club Details</h3>
                <div class="glass-panel p-4">
                    <input id="clubName" placeholder="Club Name" class="form-control mb-3">
                    <textarea id="description" placeholder="Description" rows="4" class="form-control mb-3"></textarea>
                    <label class="form-label text-white-50">Upload Logo</label>
                    <input type="file" id="logo" class="form-control mb-4">
                    <button onclick="saveClub()" class="btn btn-success w-100">Save Changes</button>
                </div>
            </div>

            <!-- CREATE EVENT -->
            <div class="col-lg-8 mb-4">
                <h3 class="section-title">Create New Event</h3>
                <div class="glass-panel p-4">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <input id="title" class="form-control" placeholder="Event Title">
                        </div>
                        <div class="col-md-6 mb-3">
                            <input id="date" type="date" class="form-control" placeholder="Date">
                        </div>
                        <div class="col-md-12 mb-3">
                            <input id="location" class="form-control" placeholder="Location">
                        </div>
                        <div class="col-md-12 mb-3">
                            <textarea id="eventDesc" rows="3" class="form-control" placeholder="Event Description"></textarea>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label text-white-50">Event Poster</label>
                            <input id="eventImage" type="file" class="form-control">
                        </div>
                        <div class="col-md-12">
                            <button onclick="createEvent()" class="btn btn-primary w-100">Create Event</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <!-- MEMBERSHIP REQUESTS -->
            <div class="col-lg-6 mb-4">
                <h3 class="section-title">Membership Requests</h3>
                <div class="row g-3" id="requestsList"></div>
            </div>
            
            <!-- COORDINATOR REQUESTS -->
            <div class="col-lg-6 mb-4">
                <h3 class="section-title">Coordinator Requests</h3>
                <div class="row g-3" id="coordinatorList"></div>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = "/login";
        }
    </script>
    <script src="/static/js/leader.js?v=2"></script>
</body>
</html>
