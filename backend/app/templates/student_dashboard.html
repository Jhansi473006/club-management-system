<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar d-flex justify-content-between px-4">
    
        <h4 class="text-white">Club Portal</h4>
    
        <div class="dropdown">
    
            <img src="/static/images/user.png" style="width:40px;height:40px;border-radius:50%;cursor:pointer;"
                data-bs-toggle="dropdown">
    
            <ul class="dropdown-menu dropdown-menu-end">
    
                <li><a class="dropdown-item" href="/student_dashboard">Dashboard</a></li>
    
                <li><a class="dropdown-item" href="/clubs_page">My Clubs</a></li>
    
                <li><a class="dropdown-item" href="/events_page">Events</a></li>
    
                <li><a class="dropdown-item text-danger" href="/">Logout</a></li>
    
            </ul>
    
        </div>
    
    </nav>


    <!-- EVENT SLIDER -->
    <div class="container mt-4">

        <h3 class="section-title">Upcoming Events</h3>

        <div id="eventSlider" class="carousel slide" data-bs-ride="carousel">

            <div class="carousel-inner" id="sliderContent">

            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#eventSlider" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#eventSlider" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>

        </div>

    </div>


    <!-- CLUBS SECTION -->
    <div class="container mt-5">

        <h3 class="section-title">Clubs</h3>

        <div class="row" id="clubList">

        </div>

    </div>
    <div class="container mt-4">
    
        <div class="row text-center">
    
            <div class="col-md-6">
                <a href="/clubs_page" class="btn btn-primary w-100 p-3">
                    Explore Clubs
                </a>
            </div>
    
            <div class="col-md-6">
                <a href="/events_page" class="btn btn-outline-dark w-100 p-3">
                    Explore Events
                </a>
            </div>
    
        </div>
    
    </div>
    <!-- CHATBOT BUTTON -->
    <button class="chatbot-btn">💬</button>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/static/js/dashboard.js"></script>

</body>

</html>
